<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>制作记录 - 后门菜品配方系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #2d7a3a;
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header h1 {
            color: #333;
            margin-bottom: 6px;
            font-size: 18px;
        }

        .header-actions {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 8px;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #2d7a3a;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd8;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .filters {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .filter-group {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
            flex: 1;
        }

        .filter-item label {
            font-weight: 600;
            color: #555;
            font-size: 12px;
            white-space: nowrap;
        }

        .filter-item input,
        .filter-item select {
            padding: 4px 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            min-width: 0;
            width: 100%;
            box-sizing: border-box;
            max-width: 100%;
        }

        .filter-item input[type="date"] {
            width: 100%;
            min-width: 0;
            max-width: 100%;
            flex: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .filter-item input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            height: auto;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
        }

        .filter-item input[type="date"]::-webkit-datetime-edit {
            padding: 0;
        }

        .filter-item input[type="date"]::-webkit-datetime-edit-fields-wrapper {
            padding: 0;
        }

        .filter-item input[type="date"]::-webkit-datetime-edit-text {
            padding: 0;
        }

        /* 隐藏日期输入框的默认样式 */
        .filter-item input[type="date"]::-webkit-inner-spin-button,
        .filter-item input[type="date"]::-webkit-clear-button {
            display: none;
        }

        /* 确保日期输入框与其他输入框样式一致 */
        .filter-item input[type="date"] {
            position: relative;
            overflow: hidden;
        }

        .filter-item input[type="date"]:focus {
            outline: none;
            border-color: #2d7a3a;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }

        .filter-group label {
            font-weight: 600;
            color: #555;
            font-size: 12px;
        }

        .filter-group select,
        .filter-group input {
            padding: 4px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: #2d7a3a;
        }

        .records-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .records-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .records-count {
            color: #666;
            font-size: 12px;
        }

        .records-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .record-item {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            padding: 6px 8px;
            transition: all 0.3s;
        }

        .record-item:hover {
            background: #e9ecef;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
            flex-wrap: wrap;
            gap: 4px;
        }

        .record-title {
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }

        .record-time {
            color: #666;
            font-size: 10px;
        }

        .record-details {
            display: flex;
            gap: 12px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .record-detail {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .record-detail-label {
            font-size: 9px;
            color: #666;
            font-weight: 500;
        }

        .record-detail-value {
            font-size: 11px;
            color: #333;
            font-weight: 600;
        }

        .record-actions {
            display: flex;
            gap: 2px;
            justify-content: flex-end;
        }

        .btn-small {
            padding: 2px 4px;
            font-size: 9px;
        }

        .empty-state {
            text-align: center;
            padding: 20px 10px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .empty-state h3 {
            margin-bottom: 4px;
            color: #333;
            font-size: 14px;
        }

        .empty-state p {
            font-size: 12px;
            line-height: 1.4;
        }

        @media (max-width: 768px) {
            .container {
                padding: 4px;
            }

            .header {
                padding: 6px 8px;
            }

            .header h1 {
                font-size: 14px;
            }

            .filter-group {
                flex-direction: column;
                gap: 4px;
            }

            .filter-item {
                width: 100%;
                display: flex;
                flex-direction: column;
            }

            .filter-item label {
                font-size: 10px;
                margin-bottom: 2px;
                display: block;
            }

            .filter-item input,
            .filter-item select {
                width: 100% !important;
                padding: 6px 8px;
                font-size: 12px;
                border: 1px solid #ddd;
                border-radius: 4px;
                box-sizing: border-box;
                min-width: 0 !important;
                max-width: 100% !important;
                flex: none !important;
            }

            .filter-item input[type="date"] {
                width: 100% !important;
                min-width: 0 !important;
                max-width: 100% !important;
                flex: none !important;
                -webkit-appearance: none !important;
                -moz-appearance: none !important;
                appearance: none !important;
                background: white !important;
                border: 1px solid #ddd !important;
                border-radius: 4px !important;
                padding: 6px 8px !important;
                font-size: 12px !important;
            }

            .filter-item input[type="date"]::-webkit-calendar-picker-indicator {
                background: transparent !important;
                color: transparent !important;
                cursor: pointer !important;
                height: 100% !important;
                width: 100% !important;
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                right: 0 !important;
                bottom: 0 !important;
            }

            .filter-item input[type="date"]::-webkit-datetime-edit {
                padding: 0 !important;
                margin: 0 !important;
            }

            .filter-item input[type="date"]::-webkit-datetime-edit-fields-wrapper {
                padding: 0 !important;
                margin: 0 !important;
            }

            .filter-item input[type="date"]::-webkit-datetime-edit-text {
                padding: 0 !important;
                margin: 0 !important;
            }

            /* 强制所有筛选框宽度一致 */
            #dateFilter,
            #recipeFilter,
            #sortBy {
                width: 100% !important;
                min-width: 0 !important;
                max-width: 100% !important;
                flex: none !important;
            }

            .records-header {
                flex-direction: column;
                align-items: stretch;
            }

            .record-item {
                padding: 4px 6px;
            }

            .record-header {
                flex-direction: row;
                align-items: center;
                margin-bottom: 1px;
            }

            .record-title {
                font-size: 12px;
            }

            .record-time {
                font-size: 9px;
            }

            .record-details {
                flex-direction: column;
                gap: 2px;
                margin-bottom: 2px;
            }

            .record-detail {
                gap: 2px;
            }

            .record-detail-label {
                font-size: 8px;
            }

            .record-detail-value {
                font-size: 10px;
            }

            .record-actions {
                justify-content: center;
                margin-top: 2px;
            }

            .btn-small {
                padding: 1px 3px;
                font-size: 8px;
            }
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .message.success {
            background: #28a745;
        }

        .message.warning {
            background: #ffc107;
            color: #333;
        }

        .message.error {
            background: #dc3545;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* 分页样式 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin: 12px 0;
            padding: 8px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            flex-wrap: wrap;
        }

        .pagination-info {
            color: #666;
            font-size: 12px;
            margin-right: 8px;
        }

        .pagination-controls {
            display: flex;
            gap: 3px;
            align-items: center;
            flex-wrap: wrap;
        }

        .pagination-btn {
            padding: 4px 8px;
            border: 1px solid #ddd;
            background: white;
            color: #333;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            min-width: 32px;
            text-align: center;
        }

        .pagination-btn:hover:not(:disabled) {
            background: #2d7a3a;
            color: white;
            border-color: #2d7a3a;
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-btn.active {
            background: #2d7a3a;
            color: white;
            border-color: #2d7a3a;
        }

        .pagination-input {
            width: 60px;
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }

        .page-size-selector {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 8px;
            flex-shrink: 0;
        }

        .page-size-selector select {
            padding: 4px 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
        }

        /* 响应式分页 */
        @media (max-width: 768px) {
            .pagination {
                flex-direction: column;
                gap: 6px;
                align-items: center;
                padding: 6px;
                margin: 8px 0;
            }
            
            .pagination-info {
                margin-right: 0;
                margin-bottom: 3px;
                text-align: center;
                font-size: 11px;
            }
            
            .pagination-controls {
                justify-content: center;
                flex-wrap: wrap;
                gap: 2px;
            }
            
            .pagination-btn {
                padding: 3px 6px;
                font-size: 11px;
                min-width: 28px;
            }
            
            .page-size-selector {
                margin-left: 0;
                justify-content: center;
                gap: 3px;
            }
            
            .page-size-selector select {
                padding: 3px 5px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 制作记录</h1>
            <div class="header-actions">
                <a href="index.html" class="btn btn-primary">🏠 返回主页</a>
                <button class="btn btn-secondary" onclick="refreshRecords()">🔄 刷新</button>
                <button class="btn btn-danger" onclick="clearAllRecords()">🗑️ 清空记录</button>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <div class="filter-item">
                    <label for="dateFilter">日期筛选</label>
                    <input type="date" id="dateFilter" onchange="filterRecords()">
                </div>
                
                <div class="filter-item">
                    <label for="recipeFilter">配方筛选</label>
                    <select id="recipeFilter" onchange="filterRecords()">
                        <option value="">全部配方</option>
                    </select>
                </div>
                
                <div class="filter-item">
                    <label for="sortBy">排序方式</label>
                    <select id="sortBy" onchange="sortRecords()">
                        <option value="newest">最新优先</option>
                        <option value="oldest">最早优先</option>
                        <option value="recipe">按配方</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="records-section">
            <div class="records-header">
                <h3>制作记录</h3>
                <div class="records-count" id="recordsCount">共 0 条记录</div>
            </div>
            <div class="records-list" id="recordsList">
                <div class="empty-state">
                    <div class="empty-state-icon">📝</div>
                    <h3>暂无制作记录</h3>
                    <p>开始制作菜品后，记录会自动保存到这里</p>
                </div>
            </div>
            
            <!-- 分页控件 -->
            <div class="pagination" id="pagination" style="display: none;">
                <div class="pagination-info" id="paginationInfo">
                    显示第 1-10 条，共 0 条记录
                </div>
                <div class="pagination-controls">
                    <button class="pagination-btn" id="firstPage" onclick="goToPage(1)">首页</button>
                    <button class="pagination-btn" id="prevPage" onclick="goToPage(this.dataset.page)">上一页</button>
                    
                    <div id="pageNumbers"></div>
                    
                    <button class="pagination-btn" id="nextPage" onclick="goToPage(this.dataset.page)">下一页</button>
                    <button class="pagination-btn" id="lastPage" onclick="goToPage(this.dataset.page)">末页</button>
                </div>
                <div class="page-size-selector">
                    <label for="pageSize">每页显示:</label>
                    <select id="pageSize" onchange="changePageSize()">
                        <option value="10">10条</option>
                        <option value="20" selected>20条</option>
                        <option value="50">50条</option>
                        <option value="100">100条</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script>
        class RecordsManager {
            constructor() {
                this.records = [];
                this.filteredRecords = [];
                this.currentPage = 1;
                this.pageSize = 20;
                this.totalPages = 0;
                this.init();
            }

            async init() {
                await this.loadRecords();
                this.populateRecipeFilter();
                this.displayRecords();
            }

            // 加载记录
            async loadRecords() {
                try {
                    console.log('正在加载制作记录...');
                    const response = await fetch('/api/records');
                    console.log('API响应状态:', response.status);
                    
                    if (response.ok) {
                        const result = await response.json();
                        console.log('API响应数据:', result);
                        
                        if (result.success) {
                            this.records = result.data;
                            console.log('成功加载记录:', this.records.length, '条');
                        } else {
                            console.error('加载记录失败:', result.message);
                            this.records = [];
                        }
                    } else {
                        console.error('服务器响应错误:', response.status);
                        this.records = [];
                    }
                } catch (error) {
                    console.error('加载记录失败:', error);
                    this.records = [];
                }
                this.filteredRecords = [...this.records];
                console.log('记录加载完成，总数:', this.records.length, '筛选后:', this.filteredRecords.length);
            }

            // 填充配方筛选器
            populateRecipeFilter() {
                const recipeFilter = document.getElementById('recipeFilter');
                const uniqueRecipes = [...new Set(this.records.map(record => record.recipeName))];
                
                uniqueRecipes.forEach(recipeName => {
                    const option = document.createElement('option');
                    option.value = recipeName;
                    option.textContent = recipeName;
                    recipeFilter.appendChild(option);
                });
            }

            // 筛选记录
            filterRecords() {
                const dateFilter = document.getElementById('dateFilter').value;
                const recipeFilter = document.getElementById('recipeFilter').value;

                console.log('筛选条件 - 日期:', dateFilter, '配方:', recipeFilter);
                console.log('筛选前记录数:', this.records.length);

                this.filteredRecords = this.records.filter(record => {
                    // 转换日期格式进行匹配
                    let matchesDate = true;
                    if (dateFilter) {
                        // 将HTML date格式(2025-10-23)转换为记录格式(2025/10/23)
                        const filterDate = dateFilter.replace(/-/g, '/');
                        matchesDate = record.date === filterDate;
                    }
                    
                    const matchesRecipe = !recipeFilter || record.recipeName === recipeFilter;
                    
                    console.log('记录日期:', record.date, '筛选日期:', dateFilter, '转换后:', dateFilter ? dateFilter.replace(/-/g, '/') : '无', '匹配日期:', matchesDate, '匹配配方:', matchesRecipe);
                    
                    return matchesDate && matchesRecipe;
                });

                console.log('筛选后记录数:', this.filteredRecords.length);
                this.currentPage = 1; // 筛选后重置到第一页
                this.displayRecords();
            }

            // 排序记录
            sortRecords() {
                const sortBy = document.getElementById('sortBy').value;
                
                this.filteredRecords.sort((a, b) => {
                    switch (sortBy) {
                        case 'newest':
                            return new Date(b.timestamp) - new Date(a.timestamp);
                        case 'oldest':
                            return new Date(a.timestamp) - new Date(b.timestamp);
                        case 'recipe':
                            return a.recipeName.localeCompare(b.recipeName);
                        default:
                            return 0;
                    }
                });

                this.displayRecords();
            }

            // 显示记录
            displayRecords() {
                const recordsList = document.getElementById('recordsList');
                const recordsCount = document.getElementById('recordsCount');
                const pagination = document.getElementById('pagination');

                recordsCount.textContent = `共 ${this.filteredRecords.length} 条记录`;

                if (this.filteredRecords.length === 0) {
                    recordsList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📝</div>
                            <h3>暂无记录</h3>
                            <p>当前筛选条件下没有找到记录</p>
                        </div>
                    `;
                    pagination.style.display = 'none';
                    return;
                }

                // 计算分页信息
                this.totalPages = Math.ceil(this.filteredRecords.length / this.pageSize);
                this.currentPage = Math.min(this.currentPage, this.totalPages);
                this.currentPage = Math.max(this.currentPage, 1);

                // 获取当前页的记录
                const startIndex = (this.currentPage - 1) * this.pageSize;
                const endIndex = startIndex + this.pageSize;
                const currentPageRecords = this.filteredRecords.slice(startIndex, endIndex);

                // 显示记录
                recordsList.innerHTML = currentPageRecords.map(record => `
                    <div class="record-item">
                        <div class="record-header">
                            <div class="record-title">${record.recipeName}</div>
                            <div class="record-time">${record.date} ${record.time}</div>
                        </div>
                        <div class="record-details">
                            <div class="record-detail">
                                <span class="record-detail-label">主材:</span>
                                <span class="record-detail-value">${record.mainIngredientName}</span>
                            </div>
                            <div class="record-detail">
                                <span class="record-detail-label">重量:</span>
                                <span class="record-detail-value">${record.mainIngredientWeight}${record.mainIngredientUnit}</span>
                            </div>
                        </div>
                        <div class="record-actions">
                            <button class="btn btn-danger btn-small" onclick="deleteRecord('${record.id}')">删除</button>
                        </div>
                    </div>
                `).join('');

                // 显示分页控件
                this.updatePagination();
            }

            // 删除记录
            async deleteRecord(recordId) {
                // 首先要求输入密码
                const password = prompt('请输入管理员密码以删除记录:');
                if (password === null) {
                    return; // 用户取消
                }
                
                if (password !== 'adminpassword') {
                    this.showMessage('密码错误，删除操作已取消', 'error');
                    return;
                }
                
                if (confirm('确定要删除这条记录吗？')) {
                    try {
                        const response = await fetch(`/api/records/${recordId}`, {
                            method: 'DELETE'
                        });
                        if (response.ok) {
                            const result = await response.json();
                            if (result.success) {
                                this.showMessage('记录已删除', 'success');
                                await this.loadRecords();
                                this.filterRecords();
                            } else {
                                this.showMessage('删除失败: ' + result.message, 'error');
                            }
                        } else {
                            this.showMessage('删除失败: 服务器错误', 'error');
                        }
                    } catch (error) {
                        console.error('删除记录失败:', error);
                        this.showMessage('删除失败: 网络错误', 'error');
                    }
                }
            }

            // 清空所有记录
            async clearAllRecords() {
                // 首先要求输入密码
                const password = prompt('请输入管理员密码以清空所有记录:');
                if (password === null) {
                    return; // 用户取消
                }
                
                if (password !== 'adminpassword') {
                    this.showMessage('密码错误，清空操作已取消', 'error');
                    return;
                }
                
                if (confirm('确定要清空所有记录吗？此操作不可恢复！')) {
                    try {
                        // 逐个删除所有记录
                        for (const record of this.records) {
                            const response = await fetch(`/api/records/${record.id}`, {
                                method: 'DELETE'
                            });
                            if (!response.ok) {
                                console.error('删除记录失败:', record.id);
                            }
                        }
                        await this.loadRecords();
                        this.filterRecords();
                        this.showMessage('所有记录已清空', 'success');
                    } catch (error) {
                        console.error('清空记录失败:', error);
                        this.showMessage('清空失败: 网络错误', 'error');
                    }
                }
            }

            // 刷新记录
            async refreshRecords() {
                await this.loadRecords();
                this.populateRecipeFilter();
                this.filterRecords();
                this.showMessage('记录已刷新', 'success');
            }

            // 显示消息
            showMessage(message, type = 'success') {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${type}`;
                messageDiv.textContent = message;
                document.body.appendChild(messageDiv);

                setTimeout(() => {
                    messageDiv.remove();
                }, 3000);
            }

            // 更新分页控件
            updatePagination() {
                const pagination = document.getElementById('pagination');
                const paginationInfo = document.getElementById('paginationInfo');
                const pageNumbers = document.getElementById('pageNumbers');
                const firstPage = document.getElementById('firstPage');
                const prevPage = document.getElementById('prevPage');
                const nextPage = document.getElementById('nextPage');
                const lastPage = document.getElementById('lastPage');

                // 显示分页控件
                pagination.style.display = this.filteredRecords.length > this.pageSize ? 'flex' : 'none';

                if (this.filteredRecords.length <= this.pageSize) {
                    return;
                }

                // 更新分页信息
                const startIndex = (this.currentPage - 1) * this.pageSize + 1;
                const endIndex = Math.min(this.currentPage * this.pageSize, this.filteredRecords.length);
                paginationInfo.textContent = `显示第 ${startIndex}-${endIndex} 条，共 ${this.filteredRecords.length} 条记录`;

                // 更新按钮状态
                firstPage.disabled = this.currentPage === 1;
                prevPage.disabled = this.currentPage === 1;
                nextPage.disabled = this.currentPage === this.totalPages;
                lastPage.disabled = this.currentPage === this.totalPages;

                // 设置上一页和下一页的页码
                prevPage.dataset.page = this.currentPage - 1;
                nextPage.dataset.page = this.currentPage + 1;
                lastPage.dataset.page = this.totalPages;

                // 生成页码按钮
                this.generatePageNumbers(pageNumbers);
            }

            // 生成页码按钮
            generatePageNumbers(container) {
                container.innerHTML = '';
                
                const maxVisiblePages = 5;
                let startPage = Math.max(1, this.currentPage - Math.floor(maxVisiblePages / 2));
                let endPage = Math.min(this.totalPages, startPage + maxVisiblePages - 1);
                
                if (endPage - startPage + 1 < maxVisiblePages) {
                    startPage = Math.max(1, endPage - maxVisiblePages + 1);
                }

                // 添加省略号
                if (startPage > 1) {
                    const ellipsis = document.createElement('span');
                    ellipsis.textContent = '...';
                    ellipsis.style.padding = '8px 4px';
                    ellipsis.style.color = '#666';
                    container.appendChild(ellipsis);
                }

                // 添加页码按钮
                for (let i = startPage; i <= endPage; i++) {
                    const pageBtn = document.createElement('button');
                    pageBtn.className = `pagination-btn ${i === this.currentPage ? 'active' : ''}`;
                    pageBtn.textContent = i;
                    pageBtn.onclick = () => this.goToPage(i);
                    container.appendChild(pageBtn);
                }

                // 添加省略号
                if (endPage < this.totalPages) {
                    const ellipsis = document.createElement('span');
                    ellipsis.textContent = '...';
                    ellipsis.style.padding = '8px 4px';
                    ellipsis.style.color = '#666';
                    container.appendChild(ellipsis);
                }
            }

            // 跳转到指定页面
            goToPage(page) {
                if (page >= 1 && page <= this.totalPages) {
                    this.currentPage = page;
                    this.displayRecords();
                }
            }

            // 改变每页显示数量
            changePageSize() {
                this.pageSize = parseInt(document.getElementById('pageSize').value);
                this.currentPage = 1;
                this.displayRecords();
            }
        }

        // 全局函数
        function deleteRecord(recordId) {
            window.recordsManager.deleteRecord(recordId);
        }

        function clearAllRecords() {
            window.recordsManager.clearAllRecords();
        }

        function refreshRecords() {
            window.recordsManager.refreshRecords();
        }

        function filterRecords() {
            window.recordsManager.filterRecords();
        }

        function sortRecords() {
            window.recordsManager.sortRecords();
        }

        function goToPage(page) {
            window.recordsManager.goToPage(page);
        }

        function changePageSize() {
            window.recordsManager.changePageSize();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            window.recordsManager = new RecordsManager();
        });
    </script>
</body>
</html>
